<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Кабинет студента</title>
  <link href="css/tailwind.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-white min-h-screen flex flex-col">
  <header class="bg-indigo-200 px-6 py-3 flex items-center justify-between">
    <a href="index.html" class="font-semibold text-gray-800">Логотип</a>
    <div class="flex items-center gap-4">
      <button class="p-2 hover:bg-indigo-300 rounded-full transition">
        <img src="icons/search.svg" alt="Поиск" class="w-5 h-5" onerror="this.style.display='none'">
      </button>
      <button class="p-2 hover:bg-indigo-300 rounded-full transition relative">
        <img src="icons/notification.svg" alt="Уведомления" class="w-5 h-5" onerror="this.style.display='none'">
      </button>
      <button class="p-2 hover:bg-indigo-300 rounded-full transition">
        <img src="icons/profile.svg" alt="Профиль" class="w-5 h-5" onerror="this.style.display='none'">
      </button>
      <div class="flex items-center gap-1 cursor-pointer">
        <span class="text-sm text-gray-700">ФИО</span>
        <img src="icons/arrow-down.svg" alt="Стрелка" class="w-4 h-4" onerror="this.style.display='none'">
      </div>
    </div>
  </header>

  <main class="flex-1 flex items-center justify-center px-6">
    <div class="text-center">
      <h1 class="text-3xl font-semibold text-gray-800 mb-4">Страница студента</h1>
      <p class="text-gray-600 mb-6">Эта страница находится в разработке</p>
      <a href="index.html" class="inline-block bg-orange-500 hover:bg-orange-600 text-white px-6 py-2 rounded font-medium transition">
        Вернуться на главную
      </a>
    </div>
  </main>

  <footer class="bg-indigo-200 px-6 py-8">
    <div class="max-w-6xl mx-auto">
      <div class="font-semibold text-gray-800">Логотип</div>
    </div>
  </footer>
</body>
</html>
