<header class="bg-indigo-200 px-6 py-3 flex items-center justify-between sticky top-0 z-10 shadow-sm" id="mainHeader">
  <a href="index.html" class="flex items-center gap-2">
    <img src="icons/icon-mini.svg" alt="Фидбэк" class="h-8 w-auto">
  </a>
  <nav class="flex items-center gap-4" aria-label="Главная навигация" id="authNav">
    <div class="flex items-center gap-1 cursor-pointer" id="guestNav">
      <span class="text-sm text-gray-900 font-medium">Вход в аккаунт</span>
    </div>
    <div class="hidden items-center gap-4" id="loggedNav">
      <a href="group.html" class="nav-link text-sm text-gray-900 font-bold transition p-2 rounded-full hover:bg-indigo-300">Управление группами</a>
      <a href="calendar.html" class="nav-link text-sm text-gray-900 font-bold transition p-2 rounded-full hover:bg-indigo-300">Календарь</a>
      <button class="p-2 hover:bg-indigo-300 rounded-full transition cursor-pointer" aria-label="Поиск">
        <img src="icons/search.svg" alt="" class="w-5 h-5" onerror="this.parentElement.innerText='⌕'">
      </button>
      <button id="notification-btn" class="p-2 hover:bg-indigo-300 rounded-full transition relative cursor-pointer" aria-label="Уведомления">
        <img src="icons/notification.svg" alt="" class="w-5 h-5" onerror="this.parentElement.innerText='🔔'">
        <span id="notificationBadge" class="hidden absolute -top-0.5 -right-0.5">
          <span class="min-w-[1.125rem] h-[1.125rem] px-1 bg-red-500 text-white text-xs font-semibold rounded-full flex items-center justify-center border-2 border-indigo-200">0</span>
        </span>
      </button>
      <button class="p-2 hover:bg-indigo-300 rounded-full transition cursor-pointer" id="profile-btn" aria-label="Профиль" aria-expanded="false">
        <img src="icons/profile.svg" alt="" class="w-5 h-5" onerror="this.parentElement.innerText='👤'">
      </button>
      <div class="flex items-center gap-1 cursor-pointer" id="profile-name" aria-label="Открыть меню профиля">
        <span class="text-sm text-gray-900 font-bold" id="headerUserName">Загрузка...</span>
      </div>
    </div>
  </nav>
</header>

<div id="profileDropdown" class="hidden absolute right-6 top-16 mt-1 bg-white border border-gray-200 rounded shadow-lg z-50 min-w-[140px]">
  <div class="px-4 py-2 text-sm text-gray-600 cursor-pointer hover:bg-gray-50" onclick="window.location.href='settings.html'">Настройки</div>
  <div class="px-4 py-2 text-sm text-gray-600 cursor-pointer hover:bg-gray-50 border-t border-gray-100" id="logoutBtn">Выход</div>
</div>

<div id="notificationDropdown" class="notification-dropdown hidden">
  <div class="w-80 max-h-[400px] bg-white border-2 border-orange-500 rounded-lg shadow-xl z-[100] flex flex-col overflow-hidden">
    <div class="px-4 py-3 border-b border-gray-200 flex justify-between items-center shrink-0">
      <h3 class="text-sm font-semibold text-gray-800">Уведомления</h3>
      <button id="notificationClearAll" class="text-xs text-orange-500 hover:text-orange-600 hover:underline bg-transparent border-none cursor-pointer">Прочитано</button>
    </div>
    <div id="notificationList" class="notification-list overflow-y-auto max-h-80">
      <div class="px-4 py-6 text-center text-gray-400 text-sm">Нет уведомлений</div>
    </div>
  </div>
</div>
