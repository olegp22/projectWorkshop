<header class="bg-indigo-200 px-4 md:px-6 py-3 flex items-center justify-between sticky top-0 z-10 shadow-sm" id="mainHeader">
  <a href="index.html" class="flex items-center gap-2 shrink-0">
    <img src="icons/icon-mini.svg" alt="Фидбэк" class="h-8 w-auto">
  </a>

  <nav class="flex items-center gap-2 md:gap-4" aria-label="Главная навигация" id="authNav">
    <!-- Гостевая навигация -->
    <div class="flex items-center gap-1 cursor-pointer" id="guestNav">
      <span class="text-sm text-gray-900 font-medium">Вход в аккаунт</span>
    </div>

    <!-- Авторизованная навигация -->
    <div class="hidden items-center gap-2 md:gap-4" id="loggedNav">
      <!-- Текстовые ссылки — только на десктопе -->
      <a href="group.html" class="nav-link hidden md:inline-flex text-sm text-gray-900 font-bold transition p-2 rounded-full hover:bg-indigo-300">Управление группами</a>
      <a href="calendar.html" class="nav-link hidden md:inline-flex text-sm text-gray-900 font-bold transition p-2 rounded-full hover:bg-indigo-300">Календарь</a>

      <!-- Иконка уведомлений -->
      <button id="notification-btn" class="p-2 hover:bg-indigo-300 rounded-full transition relative cursor-pointer shrink-0" aria-label="Уведомления">
        <img src="icons/notification.svg" alt="" class="w-5 h-5" onerror="this.parentElement.innerText='🔔'">
        <span id="notificationBadge" class="hidden absolute -top-0.5 -right-0.5">
          <span class="min-w-[1.125rem] h-[1.125rem] px-1 bg-red-500 text-white text-xs font-semibold rounded-full flex items-center justify-center border-2 border-indigo-200">0</span>
        </span>
      </button>

      <!-- Кнопка профиля -->
      <button class="p-2 hover:bg-indigo-300 rounded-full transition cursor-pointer shrink-0" id="profile-btn" aria-label="Профиль" aria-expanded="false">
        <img src="icons/profile.svg" alt="" class="w-5 h-5" onerror="this.parentElement.innerText='👤'">
      </button>

      <!-- Бургер-меню (только мобильный) -->
      <button id="burgerMenuBtn" class="md:hidden p-2 hover:bg-indigo-300 rounded-full transition cursor-pointer shrink-0" aria-label="Меню" aria-expanded="false">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>

      <!-- Имя пользователя (только десктоп) -->
      <div class="hidden md:flex items-center gap-1 cursor-pointer max-w-[120px]" id="profile-name" aria-label="Открыть меню профиля">
        <span class="text-sm text-gray-900 font-bold truncate" id="headerUserName">Загрузка...</span>
      </div>
    </div>
  </nav>
</header>

<!-- Dropdown профиля — ВНЕ шапки, z-index 9999 чтобы быть точно над всем -->
<div id="profileDropdown" class="hidden fixed bg-white border border-gray-200 rounded shadow-lg min-w-[140px]" style="z-index: 9999;">
  <div class="px-4 py-2 text-sm text-gray-600 cursor-pointer hover:bg-gray-50 border-b border-gray-100" onclick="window.location.href='settings.html'">Настройки</div>
  <div class="px-4 py-2 text-sm text-gray-600 cursor-pointer hover:bg-gray-50" id="logoutBtn">Выход</div>
</div>

<!-- Бургер-меню dropdown — ВНЕ шапки, z-index 9999 чтобы быть точно над всем -->
<div id="burgerDropdown" class="hidden fixed bg-white border border-gray-200 rounded shadow-lg min-w-[200px]" style="z-index: 9999;">
  <div class="px-4 py-2 text-sm text-gray-600 cursor-pointer hover:bg-gray-50 border-b border-gray-100" onclick="window.location.href='group.html'">Управление группами</div>
  <div class="px-4 py-2 text-sm text-gray-600 cursor-pointer hover:bg-gray-50 border-b border-gray-100" onclick="window.location.href='calendar.html'">Календарь</div>
  <div class="px-4 py-2 text-sm text-gray-600 cursor-pointer hover:bg-gray-50" onclick="window.location.href='my-projects.html'">Мои проекты</div>
</div>

<!-- Уведомления — тоже z-index 9999 для консистентности -->
<div id="notificationDropdown" class="notification-dropdown hidden" style="z-index: 9999;">
  <div class="w-80 max-h-[400px] bg-white border-2 border-orange-500 rounded-lg shadow-xl flex flex-col overflow-hidden">
    <div class="px-4 py-3 border-b border-gray-200 flex justify-between items-center shrink-0">
      <h3 class="text-sm font-semibold text-gray-800">Уведомления</h3>
      <button id="notificationClearAll" class="text-xs text-orange-500 hover:text-orange-600 hover:underline bg-transparent border-none cursor-pointer">Прочитано</button>
    </div>
    <div id="notificationList" class="notification-list overflow-y-auto max-h-80">
      <div class="px-4 py-6 text-center text-gray-400 text-sm">Нет уведомлений</div>
    </div>
  </div>
</div>
