<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Оценка проекта — ФидбэК</title>
  <link href="css/tailwind.css" rel="stylesheet">
  <link rel="stylesheet" href="css/notification.css">
  <link rel="stylesheet" href="css/review-detail.css">
<base target="_blank">
</head>
<body class="bg-white font-sans antialiased flex flex-col min-h-screen">

  <div id="layout-header"></div>

  <main class="flex-1 max-w-4xl w-full mx-auto px-6 py-8">
    <h1 class="text-2xl font-semibold text-gray-800 mb-2">
      Проект <span id="projectName" class="text-orange-500">*Название проекта*</span>
      <span id="modeBadge" class="text-sm text-gray-500 font-normal"></span>
    </h1>
    <div class="mb-6">
      <a href="#" id="projectDownloadLink" class="text-purple-600 text-sm hover:underline break-all">*ссылка для скачивания проекта*</a>
    </div>


    <div class="mb-8" id="feedbackBlock">
      <label class="block text-sm text-gray-700 mb-2">Обратная связь:</label>
      <div class="relative">
        <textarea id="feedbackText" rows="3" class="w-full px-3 py-2 pr-10 border border-gray-300 text-sm rounded focus:border-purple-400 focus:outline-none resize-none" placeholder="Введите ваш комментарий..."></textarea>
        <button id="voiceFeedbackBtn" class="absolute right-2 top-2 text-gray-400 hover:text-gray-600 transition" title="Голосовое сообщение">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"/>
          </svg>
        </button>
      </div>
    </div>


    <div id="contestScaleBlock" class="hidden mb-8">
      <label class="block text-sm text-gray-700 mb-4">Ваша оценка (1–10):</label>
      <div class="contest-scale" id="contestScale">
        <div class="contest-scale-line"></div>
        <div class="contest-scale-marks" id="contestScaleMarks"></div>
        <div class="contest-scale-marker hidden" id="contestMarker">
          <span id="contestMarkerValue">5</span>
        </div>
      </div>
      <div class="contest-score-display mt-4 text-center">
        <span class="text-sm text-gray-600">Выбрано:</span>
        <span id="contestSelectedScore" class="text-2xl font-bold text-orange-500 ml-2">—</span>
        <span class="text-sm text-gray-500">/ 10</span>
      </div>
    </div>


    <div id="criteriaList" class="space-y-10 mb-8"></div>

    <div class="text-center mb-6">
      <p class="text-lg font-medium text-gray-800 mb-4">
        Итоговый балл: <span id="totalScore" class="font-bold">**</span>/<span id="maxTotalScore" class="font-bold">**</span>
      </p>
      <button id="finishReviewBtn" class="bg-orange-500 text-white px-8 py-2.5 rounded text-sm font-medium hover:bg-orange-600 transition cursor-pointer border-none">
        Завершить проверку
      </button>
    </div>
  </main>

  <div id="layout-footer"></div>

  <script type="module" src="js/layout-loader.js"></script>
  <script type="module" src="js/review-detail.js"></script>
</body>
</html>
