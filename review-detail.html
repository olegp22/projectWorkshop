<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Оценка проекта — ФидбэК</title>
  <link href="css/tailwind.css" rel="stylesheet">
  <link rel="stylesheet" href="css/notification.css">
  <link rel="stylesheet" href="css/review-detail.css">
<base target="_blank">
</head>
<body class="bg-white font-sans antialiased flex flex-col min-h-screen">

  <div id="layout-header"></div>

  <main class="flex-1 max-w-4xl w-full mx-auto px-6 py-8">
    <h1 class="text-2xl font-semibold text-gray-800 mb-2">Проект <span id="projectName" class="text-orange-500">*Название проекта*</span></h1>
    <div class="mb-6">
      <a href="#" id="projectDownloadLink" class="text-purple-600 text-sm hover:underline break-all">*ссылка для скачивания проекта*</a>
    </div>
    <div class="mb-6">
      <label class="block text-sm text-gray-700 mb-2">Обратная связь:</label>
      <textarea id="feedbackText" rows="3" class="w-full px-3 py-2 border border-gray-300 text-sm rounded focus:border-orange-400 focus:outline-none resize-none" placeholder="Введите ваш комментарий..."></textarea>
    </div>

    <!-- Классические критерии (скрываются в contest) -->
    <div id="criteriaList" class="space-y-8 mb-8"></div>

    <!-- Contest: голосование баллами -->
    <div id="contestVoting" class="hidden space-y-6 mb-8">
      <h3 class="text-base font-medium text-gray-800">Ваша оценка:</h3>
      <div class="flex items-center justify-center gap-3 flex-wrap">
        <button class="contest-score w-12 h-12 rounded-full border-2 border-purple-500 text-purple-700 font-bold text-lg hover:bg-purple-500 hover:text-white transition" data-score="1">1</button>
        <button class="contest-score w-12 h-12 rounded-full border-2 border-purple-500 text-purple-700 font-bold text-lg hover:bg-purple-500 hover:text-white transition" data-score="2">2</button>
        <button class="contest-score w-12 h-12 rounded-full border-2 border-purple-500 text-purple-700 font-bold text-lg hover:bg-purple-500 hover:text-white transition" data-score="3">3</button>
        <button class="contest-score w-12 h-12 rounded-full border-2 border-purple-500 text-purple-700 font-bold text-lg hover:bg-purple-500 hover:text-white transition" data-score="4">4</button>
        <button class="contest-score w-12 h-12 rounded-full border-2 border-purple-500 text-purple-700 font-bold text-lg hover:bg-purple-500 hover:text-white transition" data-score="5">5</button>
        <button class="contest-score w-12 h-12 rounded-full border-2 border-purple-500 text-purple-700 font-bold text-lg hover:bg-purple-500 hover:text-white transition" data-score="6">6</button>
        <button class="contest-score w-12 h-12 rounded-full border-2 border-purple-500 text-purple-700 font-bold text-lg hover:bg-purple-500 hover:text-white transition" data-score="7">7</button>
        <button class="contest-score w-12 h-12 rounded-full border-2 border-purple-500 text-purple-700 font-bold text-lg hover:bg-purple-500 hover:text-white transition" data-score="8">8</button>
        <button class="contest-score w-12 h-12 rounded-full border-2 border-purple-500 text-purple-700 font-bold text-lg hover:bg-purple-500 hover:text-white transition" data-score="9">9</button>
        <button class="contest-score w-12 h-12 rounded-full border-2 border-purple-500 text-purple-700 font-bold text-lg hover:bg-purple-500 hover:text-white transition" data-score="10">10</button>
      </div>
      <p class="text-center text-sm text-gray-500">Выберите балл от 1 до 10</p>
    </div>

    <div class="text-center mb-6">
      <p class="text-lg font-medium text-gray-800 mb-4">Итоговый балл: <span id="totalScore" class="font-bold">**</span>/<span id="maxTotalScore" class="font-bold">**</span></p>
      <button id="finishReviewBtn" class="bg-orange-500 text-white px-8 py-2.5 rounded text-sm font-medium hover:bg-orange-600 transition cursor-pointer border-none">Завершить оценку</button>
    </div>
  </main>

  <div id="layout-footer"></div>

  <script type="module" src="js/layout-loader.js"></script>
  <script type="module" src="js/review-detail.js"></script>
</body>
</html>
